  <!-- Script Logic -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById("bg-video");
      const text1 = document.getElementById("text-1");
      const text2 = document.getElementById("text-2");
      const text3 = document.getElementById("text-3");
      const fadeScreen = document.getElementById("fade-black-screen");
      const finaleWrapper = document.getElementById("finale-wrapper");
      const finalWords = document.getElementById("final-words");
      const actionTrigger = document.getElementById("action-trigger");

      // Dynamic fallback for the finale image to load high-fidelity SVG illustration
      const finaleImg = document.getElementById("finale-img");
      const finaleSvg = document.getElementById("finale-svg");

      if (finaleImg && finaleSvg) {
        finaleImg.addEventListener("error", () => {
          console.log("Local Durie.png not detected. Swapped seamlessly to custom Vector illustration fallback.");
          finaleImg.classList.add("hidden");
          finaleSvg.classList.remove("hidden");
        });
        
        // Handle scenario where error triggered before event listener bound
        if (finaleImg.complete && !finaleImg.naturalWidth) {
          finaleImg.classList.add("hidden");
          finaleSvg.classList.remove("hidden");
        }
      }

      // Set video parameters securely
      if (video) {
        video.muted = true;
        video.playsInline = true;
        video.currentTime = 0;

        // Ensure video is visible as soon as it starts to flow
        video.addEventListener("playing", () => {
          gsap.to(video, { opacity: 1, duration: 1 });
        });

        // Trigger safe auto-play
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.log("Autoplay was prevented by browser security profile. Waiting for user interaction to begin movie.", error);
            // Click any point of the body as a backup play event trigger
            document.body.addEventListener("click", () => {
              video.play();
            }, { once: true });
          });
        }
      }

      // ===================================
      // HIGH-ACCURACY PLAYBACK STATES LOGIC
      // ===================================

      let step1Processed = false;
      let step2Processed = false;
      let step3Processed = false;
      let step4Processed = false;

      function checkPlaybackState(coordsTime) {
        // Step 1: 0 to 4 seconds
        if (coordsTime >= 0.1 && coordsTime < 3.8) {
          if (!step1Processed) {
            text1.classList.add("active");
            step1Processed = true;
          }
        } else {
          if (step1Processed && (coordsTime >= 3.8 || coordsTime < 0.1)) {
            text1.classList.remove("active");
            step1Processed = false;
          }
        }

        // Step 2: 4 to 8 seconds
        if (coordsTime >= 4.0 && coordsTime < 7.8) {
          if (!step2Processed) {
            text2.classList.add("active");
            step2Processed = true;
          }
        } else {
          if (step2Processed && (coordsTime >= 7.8 || coordsTime < 4.0)) {
            text2.classList.remove("active");
            step2Processed = false;
          }
        }

        // Step 3: 8 to 12 seconds
        if (coordsTime >= 8.0 && coordsTime < 11.5) {
          if (!step3Processed) {
            text3.classList.add("active");
            step3Processed = true;
          }
        } else {
          if (step3Processed && (coordsTime >= 11.5 || coordsTime < 8.0)) {
            text3.classList.remove("active");
            step3Processed = false;
          }
        }

        // Step 4: Beyond 11.8 seconds (Smooth fade transition to the photograph)
        if (coordsTime >= 11.8) {
          if (!step4Processed) {
            triggerGrandFinale();
            step4Processed = true;
          }
        }
      }

      // Track playback coordinates directly from hardware frames
      if (video) {
        video.addEventListener("timeupdate", () => {
          checkPlaybackState(video.currentTime);
        });
      }

      // Backup fail-proof timer sequence execution in case video encounters decoding limits or hangs on network buffering
      let videoStartTime = Date.now();
      const backupInterval = setInterval(() => {
        let elapsedTime = (Date.now() - videoStartTime) / 1000;
        
        // If the video actual timeline is frozen, fall back to elapsed countdown metric
        if (!video || video.paused || video.ended) {
          checkPlaybackState(elapsedTime);
        }
        
        if (elapsedTime > 14) {
          clearInterval(backupInterval);
        }
      }, 100);

      // Trigger grand final picture show animations
      function triggerGrandFinale() {
        console.log("Starting cinematic culmination transition.");
        
        // 1. Gently dim the video layer to black screen mask comfort
        fadeScreen.classList.remove("pointer-events-none");
        fadeScreen.classList.add("opacity-100");

        // 2. Animate photo frame overlay in 1.4s
        setTimeout(() => {
          finaleWrapper.classList.remove("pointer-events-none");
          finaleWrapper.classList.add("opacity-100", "scale-100");

          // 3. Fade in final romantic words and actions button chronologically
          setTimeout(() => {
            finalWords.classList.add("opacity-100");
            finalWords.classList.remove("translate-y-4");
          }, 600);

          setTimeout(() => {
            actionTrigger.classList.add("opacity-100");
            actionTrigger.classList.remove("translate-y-4");
          }, 1400);

        }, 1200);
      }

    });
  </script>

  <!-- Persistent Dual-Song Playlist Audio Controller -->
  <script>
    (function() {
      const playlist = [
        "/Something Just Like This.mp3",
        "/There is a light that never goes out.mp3"
      ];
      
      let currentTrackIndex = parseInt(localStorage.getItem("bg_music_track_index") || "0", 10);
      if (currentTrackIndex < 0 || currentTrackIndex >= playlist.length) {
        currentTrackIndex = 0;
      }
      
      let isMuted = localStorage.getItem("bg_music_muted") !== "false"; // default to muted unless explicitly unmuted
      let audio = null;
      let saveInterval = null;

      function initAudio() {
        if (audio) return;
        
        currentTrackIndex = parseInt(localStorage.getItem("bg_music_track_index") || "0", 10);
        if (currentTrackIndex < 0 || currentTrackIndex >= playlist.length) {
          currentTrackIndex = 0;
        }
        const savedTime = parseFloat(localStorage.getItem("bg_music_track_time") || "0");

        audio = new Audio(playlist[currentTrackIndex]);
        audio.volume = 0.15; // Soft cinematic background volume
        audio.currentTime = savedTime;
        
        audio.addEventListener("ended", () => {
          nextTrack();
        });

        saveInterval = setInterval(() => {
          if (audio && !audio.paused) {
            localStorage.setItem("bg_music_track_time", audio.currentTime.toString());
          }
        }, 1000);

        // Try playing if unmuted
        if (!isMuted) {
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.catch(e => {
              console.log("Auto-play deferred until user document interaction.", e);
            });
          }
        }
      }

      function nextTrack() {
        if (!audio) return;
        audio.pause();
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        localStorage.setItem("bg_music_track_index", currentTrackIndex.toString());
        localStorage.setItem("bg_music_track_time", "0");
        audio.src = playlist[currentTrackIndex];
        audio.currentTime = 0;
        if (!isMuted) {
          audio.play().catch(e => console.log("Next track play prevented", e));
        }
        updateButtonUI();
      }

      function toggleMute() {
        isMuted = !isMuted;
        localStorage.setItem("bg_music_muted", isMuted ? "true" : "false");
        
        if (isMuted) {
          if (audio) {
            audio.pause();
            localStorage.setItem("bg_music_track_time", audio.currentTime.toString());
          }
        } else {
          if (!audio) {
            initAudio();
          } else {
            audio.play().catch(e => console.log("Audio play deferred", e));
          }
        }
        updateButtonUI();
      }

      function createAudioControls() {
        const parent = document.createElement("div");
        parent.id = "global-music-pill";
        // Fixed positioning in bottom right corner with beautiful design elements
        parent.className = "fixed bottom-6 right-6 z-[100] flex items-center gap-3 bg-stone-950/85 backdrop-blur border border-white/10 rounded-full px-4 py-2.5 text-white shadow-[0_4px_30px_rgba(227,11,92,0.15)] pointer-events-auto transition-all duration-300 hover:border-raspberry/50 group select-none";
        
        const audioWave = document.createElement("div");
        audioWave.className = "flex items-end gap-[3px] h-3 w-4 shrink-0 mb-0.5";
        for (let i = 0; i < 4; i++) {
          const bar = document.createElement("span");
          bar.className = "w-[2px] bg-raspberry rounded-full origin-bottom transform transition-all duration-300";
          bar.style.height = "15%";
          bar.id = `wave-bar-${i}`;
          audioWave.appendChild(bar);
        }

        const titleDiv = document.createElement("div");
        titleDiv.className = "flex flex-col text-left leading-none";
        
        const smallLabel = document.createElement("span");
        smallLabel.className = "font-mono text-[8px] text-stone-500 uppercase tracking-widest";
        smallLabel.innerText = "Ambient Loop";

        const titleSpan = document.createElement("span");
        titleSpan.className = "font-sans text-[10px] font-medium text-stone-300 max-w-[150px] truncate select-none transition-colors group-hover:text-stone-100 mt-0.5 h-[12px] leading-tight";
        titleSpan.id = "music-title-display";
        
        // Clean display name of song (unescaping url encodings or names)
        const rawName = playlist[currentTrackIndex].substring(1).replace(".mp3", "");
        titleSpan.innerText = rawName;

        titleDiv.appendChild(smallLabel);
        titleDiv.appendChild(titleSpan);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "ml-2 hover:text-raspberry transition-all duration-300 flex items-center justify-center p-1.5 rounded-full bg-stone-900 hover:bg-stone-800 border border-white/5 shadow-inner cursor-pointer animate-none outline-none";
        toggleBtn.innerHTML = getIconSVG();
        toggleBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleMute();
        });

        parent.appendChild(audioWave);
        parent.appendChild(titleDiv);
        parent.appendChild(toggleBtn);
        
        document.body.appendChild(parent);

        // Animate wave lines periodically
        function animateWave() {
          const isCurrentlyPlaying = audio && !audio.paused && !isMuted;
          for (let i = 0; i < 4; i++) {
            const bar = document.getElementById(`wave-bar-${i}`);
            if (bar) {
              if (isCurrentlyPlaying) {
                const h = Math.floor(Math.random() * 85) + 15;
                bar.style.height = `${h}%`;
              } else {
                bar.style.height = "15%";
              }
            }
          }
          setTimeout(animateWave, 150);
        }
        animateWave();
        updateButtonUI();
      }

      function getIconSVG() {
        if (isMuted) {
          return `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #F43F5E"><path d="M11 5 6 9 2 9v6h4l5 4V5z"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>`;
        } else {
          return `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #F43F5E"><path d="M11 5 6 9 2 9v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
        }
      }

      function updateButtonUI() {
        const titleSpan = document.getElementById("music-title-display");
        if (titleSpan) {
          const rawName = playlist[currentTrackIndex].substring(1).replace(".mp3", "");
          titleSpan.innerText = rawName;
        }
        const pill = document.getElementById("global-music-pill");
        if (pill) {
          const btn = pill.querySelector("button");
          if (btn) btn.innerHTML = getIconSVG();
        }
      }

      // Automatically play once clicked anywhere (browser click pass policy)
      document.addEventListener("click", () => {
        if (!audio) {
          initAudio();
        } else if (!isMuted && audio.paused) {
          audio.play().catch(e => console.log("User interaction audio resume policy active", e));
        }
      }, { once: false });

      // Temporarily pause audio when document becomes invisible (tab backgrounded)
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          if (audio && !audio.paused) {
            audio.pause();
          }
        } else {
          if (audio && !isMuted) {
            audio.play().catch(e => console.log("Visibility resume play avoided", e));
          }
        }
      });

      // Save play coordinates beforeunload
      window.addEventListener("beforeunload", () => {
        if (audio) {
          localStorage.setItem("bg_music_track_time", audio.currentTime.toString());
        }
      });

      // Start
      initAudio();
      
      // Delay UI load slightly to prevent rendering before HTML body parses
      setTimeout(() => {
        createAudioControls();
      }, 300);
      
    })();
  </script>
</body>
</html>
